name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: swift:6.0-jammy

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        apt-get update
        apt-get install -y libsqlite3-dev pkg-config ffmpeg

    - name: Build
      run: swift build -c release

    - name: Run Tests
      run: swift test

    - name: Install Python 3
      run: apt-get install -y --no-install-recommends python3

    - name: Check DocsCommand.swift coverage (drift guard)
      # Fails the build if a developer adds a parser flag (@Option / @Flag)
      # without documenting it in DocsCommand.swift.
      # See scripts/check_docs_coverage.py for details.
      run: python3 scripts/check_docs_coverage.py --vvx .build/release/vvx
